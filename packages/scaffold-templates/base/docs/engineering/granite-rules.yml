version: 1
policy: granite-routing-ssot
last_verified: 2026-02-26
source_of_truth: docs/engineering/granite-ssot.md

forbidden_patterns:
  - id: route-dynamic-segment-dollar
    description: App Router style $param path is forbidden in MiniApp routes
    regex: '/\$[a-zA-Z][a-zA-Z0-9_]*'
    targets:
      - 'frontend/pages/**/*.tsx'
      - 'frontend/src/pages/**/*.tsx'
      - 'frontend/src/**/*.ts'
      - 'frontend/src/**/*.tsx'
  - id: filename-dollar-pattern
    description: file or symbol names like book.$bookId are forbidden
    regex: 'book\.\$[a-zA-Z][a-zA-Z0-9_]*|\$[a-zA-Z][a-zA-Z0-9_]*\.tsx'
    targets:
      - 'frontend/pages/**/*.tsx'
      - 'frontend/src/pages/**/*.tsx'

allowed_alternatives:
  - id: fixed-path-routing
    examples:
      - '/book-detail'
      - "navigation.navigate('/book-detail', { bookId })"
  - id: params-validation
    examples:
      - "createRoute('/book-detail', { validateParams, component })"

required_checks:
  - id: router-sync
    command: "test -f frontend/src/router.gen.ts"
    pass_criteria: "router.gen.ts exists and route keys match entry pages"
  - id: verify
    command: pnpm verify
    pass_criteria: exit_code_0

required_report_evidence_fields:
  - task
  - date
  - branch
  - commit
  - changed_files
  - checks
  - granite_reference_sections
  - applied_locations
  - risks_or_followups
